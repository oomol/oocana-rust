name: Test on oocana-node
on:
  workflow_call:
    inputs:
      create-layer:
        required: false
        type: boolean
        default: false
      ovmlayer-repository:
        required: false
        type: string
        default: ovmlayer-next

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        if: ${{ inputs.create-layer }}
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Generate GitHub App Token for oomol/${{ inputs.ovmlayer-repository }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.OOMOL_DOWNLOADER_APP_ID }}
          private-key: ${{ secrets.OOMOL_DOWNLOADER_APP_PRIVATE_KEY }}
          owner: oomol
          repositories: ${{ inputs.ovmlayer-repository }}
        if: ${{ inputs.create-layer }}
      - uses: ./.github/actions/ovmlayer
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ inputs.ovmlayer-repository }}
        if: ${{ inputs.create-layer }}
      - name: Download oocana
        uses: actions/download-artifact@v4
        with:
          name: oocana
          path: target
      - name: add permissions
        run: |
          chmod +x target/oocana
      - uses: oomol/oocana-python/.github/actions/oocana-python@main
        with:
          path: oocana-python
          create-layer: ${{ inputs.create-layer }}
      - name: Start MQTT Broker
        run: |
          sudo apt update && sudo apt install -y --no-install-recommends mosquitto
          mosquitto -d -p 47688
      - name: install oocana-python
        run: |
          cd flow-examples
          npm install
        working-directory: oocana-python
      - name: replace oocana
        run: cp target/oocana oocana-python/flow-examples/node_modules/@oomol/oocana/
      - name: test flow and other oocana api
        run: |
          source .venv/bin/activate
          cd flow-examples
          npm run test
        working-directory: oocana-python
      - name: upload logs
        uses: actions/upload-artifact@v4
        with:
          name: oocana-python-logs
          path: |
            ~/.oocana/sessions/
          retention-days: 1
        if: failure()
