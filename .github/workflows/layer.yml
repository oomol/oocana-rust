name: layer test

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  OVMLAYER_LOG: /tmp/ovmlayer.log

jobs:
  skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.filter.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          filter: blob:none
          fetch-depth: 0
      - uses: leavesster/pull-request-path-filter@v0.2
        id: "filter"
        with:
          paths: |
            - "**"
            - "!.devcontainer/**"
            - "!.github/**"
            - ".github/workflows/layer.yml"
            - ".github/workflows/oocana-node.yml"
            - ".github/workflows/oocana-python.yml"
            - ".github/actions/ovmlayer/action.yml"
            - "!layer/**.md"

  rust-test:
    runs-on: ubuntu-latest
    needs: [skip]
    if: ${{ needs.skip.outputs.should_skip == 'false' }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
      - name: Generate GitHub App Token for oomol/${{ vars.OVMLAYER_REPOSITORY }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.OOMOL_DOWNLOADER_APP_ID }}
          private-key: ${{ secrets.OOMOL_DOWNLOADER_APP_PRIVATE_KEY }}
          owner: oomol
          repositories: ${{ vars.OVMLAYER_REPOSITORY }}
      - uses: ./.github/actions/ovmlayer
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ vars.OVMLAYER_REPOSITORY }}
          use-runtime-setup: "true"
      - name: test layer api
        run: |
          sudo PATH=/snap/bin:/home/runner/.local/bin:/opt/pipx_bin:/home/runner/.cargo/bin:/home/runner/.config/composer/vendor/bin:/usr/local/.ghcup/bin:/home/runner/.dotnet/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin /home/runner/.cargo/bin/cargo test --package layer -- --nocapture --test-threads=1 # 部分单测 API 互相干扰，需要一个个测试
      - name: upload ovmlayer log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ovmlayer-log
          path: ${{ env.OVMLAYER_LOG }}
          if-no-files-found: ignore
          retention-days: 7
      - name: build oocana
        run: cargo build
      - name: upload oocana
        uses: actions/upload-artifact@v4
        with:
          name: oocana
          path: target/debug/oocana

  node-test:
    needs: [skip, rust-test]
    uses: ./.github/workflows/oocana-node.yml
    with:
      create-layer: true
      ovmlayer-repository: ${{ vars.OVMLAYER_REPOSITORY }}
    secrets: inherit
  python-test:
    needs: [skip, rust-test]
    uses: ./.github/workflows/oocana-python.yml
    with:
      create-layer: true
      ovmlayer-repository: ${{ vars.OVMLAYER_REPOSITORY }}
    secrets: inherit
  layer-build:
    runs-on: ubuntu-latest
    needs: [skip, rust-test, python-test, node-test]
    if: ${{ always() }}
    steps:
      - name: check
        run: |
          exit_on_result() {
            if [[ "$2" == "failure" || "$2" == "cancelled" ]]; then
              echo "Job '$1' failed or was cancelled."
              exit 1
            fi
          }


          exit_on_result "skip" "${{ needs.skip.result }}"
          exit_on_result "node-test" "${{ needs.node-test.result }}"
          exit_on_result "python-test" "${{ needs.python-test.result }}"
          echo all needs jobs : "${{ toJson(needs)}}"
