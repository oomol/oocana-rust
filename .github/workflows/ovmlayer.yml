name: "ovmlayer action"
description: "setup ovmlayer on ubuntu-latest"

on:
  workflow_dispatch:
    inputs:
      repository:
        description: GitHub repository to download ovmlayer releases from
        required: false
        type: string
  pull_request:
    paths:
      - ".github/workflows/ovmlayer.yml"
      - ".github/actions/ovmlayer/action.yml"

jobs:
  ovmlayer:
    runs-on: ubuntu-latest
    env:
      OVMLAYER_REPOSITORY: ${{ inputs.repository || vars.OVMLAYER_REPOSITORY || 'ovmlayer-next' }}
      OVMLAYER_USE_RUNTIME_SETUP: ${{ (inputs.repository || vars.OVMLAYER_REPOSITORY || 'ovmlayer-next') == (vars.OVMLAYER_REPOSITORY || 'ovmlayer-next') }}
    steps:
      - uses: actions/checkout@v6
      - name: Generate GitHub App Token for oomol/${{ env.OVMLAYER_REPOSITORY }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.OOMOL_DOWNLOADER_APP_ID }}
          private-key: ${{ secrets.OOMOL_DOWNLOADER_APP_PRIVATE_KEY }}
          owner: oomol
          repositories: ${{ env.OVMLAYER_REPOSITORY }}
      - uses: ./.github/actions/ovmlayer
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ env.OVMLAYER_REPOSITORY }}
          use-runtime-setup: ${{ env.OVMLAYER_USE_RUNTIME_SETUP }}
