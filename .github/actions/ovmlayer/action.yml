name: "setup ovmlayer"
description: "setup ovmlayer on ubuntu-latest"
inputs:
  token:
    description: "GitHub token with access to the ovmlayer release repository"
    required: true
    default: ${{ github.token }}
  repository:
    description: "GitHub repository name under oomol to download ovmlayer releases from"
    required: true
  use-runtime-setup:
    description: "Whether to use ovmlayer setup with an extracted rootfs directory"
    required: false
    default: "false"
  rootfs:
    description: "rootfs tar"
    required: false
    default: "https://github.com/oomol/ovmlayer-rootfs/releases/download/base-rootfs%400.4.0/amd64-rootfs.tar"
runs:
  using: "composite"
  steps:
    - name: setup ovmlayer environment
      run: |
        sudo apt update
        sudo apt install -y --no-install-recommends tar zstd
      shell: bash
    - name: download ovmlayer
      run: |
        arch=$(uname -m)
        case "$arch" in
          x86_64)
            arch=amd64
            ;;
          aarch64|arm64)
            arch=arm64
            ;;
          *)
            echo "unsupported architecture: $arch" >&2
            exit 1
            ;;
        esac

        gh release download \
          --repo "oomol/${{ inputs.repository }}" \
          --pattern "*${arch}*" \
          --clobber \
          -O ovmlayer.tar.zst

        zstd -d ovmlayer.tar.zst -o ovmlayer.tar
        mkdir -p ovmlayer-bin
        tar -xf ovmlayer.tar -C ovmlayer-bin

        bin=$(find "$(pwd)/ovmlayer-bin" -name ovmlayer -type f | head -n 1)
        if [[ -z "$bin" ]]; then
          echo "ovmlayer binary not found in downloaded archive" >&2
          exit 1
        fi

        sudo install -m 755 "$bin" /usr/local/bin/ovmlayer
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
    - name: download base rootfs
      run: |
        curl -L ${{inputs.rootfs}} -o base_rootfs.tar
      shell: bash
    - name: extract base rootfs for runtime setup
      if: inputs.use-runtime-setup == 'true'
      run: |
        mkdir -p base_rootfs
        tar -xf base_rootfs.tar -C base_rootfs
      shell: bash
    - name: setup ovmlayer
      run: |
        if [[ "${{ inputs.use-runtime-setup }}" == "true" ]]; then
          sudo ovmlayer setup --runtime /ovmlayer-workspace --external /dev/shm --rootfs-path=$(pwd)/base_rootfs
        else
          sudo ovmlayer setup dev --base-rootfs=$(pwd)/base_rootfs.tar --layer-disk=/tmp/layer-disk
        fi
      shell: bash
