name: "setup ovmlayer"
description: "setup ovmlayer on ubuntu-latest"
inputs:
  token:
    description: "GitHub token with access to the ovmlayer release repository"
    required: true
    default: ${{ github.token }}
  repository:
    description: "GitHub repository name under oomol to download ovmlayer releases from"
    required: true
  use-runtime-setup:
    description: "Whether to use ovmlayer setup with an extracted rootfs directory"
    required: false
    default: "false"
  rootfs:
    description: "rootfs tar"
    required: false
    default: "https://github.com/oomol/ovmlayer-rootfs/releases/download/base-rootfs%400.4.0/amd64-rootfs.tar"
runs:
  using: "composite"
  steps:
    - name: setup ovmlayer environment
      run: |
        set -euo pipefail

        if command -v sudo >/dev/null 2>&1 && [[ "$(id -u)" -ne 0 ]]; then
          SUDO="sudo"
        else
          SUDO=""
        fi

        ${SUDO} apt-get update
        ${SUDO} apt-get install -y --no-install-recommends ca-certificates curl gh tar zstd
      shell: bash
    - name: download ovmlayer
      run: |
        set -euo pipefail

        arch=$(uname -m)
        case "$arch" in
          x86_64)
            arch=amd64
            ;;
          aarch64|arm64)
            arch=arm64
            ;;
          *)
            echo "unsupported architecture: $arch" >&2
            exit 1
            ;;
        esac

        gh release download \
          --repo "oomol/${{ inputs.repository }}" \
          --pattern "*${arch}*" \
          --clobber \
          -O ovmlayer.tar.zst

        zstd -d ovmlayer.tar.zst -o ovmlayer.tar
        mkdir -p ovmlayer-bin
        tar -xf ovmlayer.tar -C ovmlayer-bin

        bin=$(find "$(pwd)/ovmlayer-bin" -name ovmlayer -type f | head -n 1)
        if [[ -z "$bin" ]]; then
          echo "ovmlayer binary not found in downloaded archive" >&2
          exit 1
        fi

        if command -v sudo >/dev/null 2>&1 && [[ "$(id -u)" -ne 0 ]]; then
          sudo install -m 755 "$bin" /usr/local/bin/ovmlayer
        else
          install -m 755 "$bin" /usr/local/bin/ovmlayer
        fi
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
    - name: download base rootfs
      run: |
        curl -L ${{inputs.rootfs}} -o base_rootfs.tar
      shell: bash
    - name: extract base rootfs for runtime setup
      if: inputs.use-runtime-setup == 'true'
      run: |
        set -euo pipefail
        mkdir -p base_rootfs
        tar -xf base_rootfs.tar -C "$(pwd)/base_rootfs"
      shell: bash
    - name: setup ovmlayer
      run: |
        set -euo pipefail

        if command -v sudo >/dev/null 2>&1 && [[ "$(id -u)" -ne 0 ]]; then
          run_as_root() {
            sudo "$@"
          }
        else
          run_as_root() {
            "$@"
          }
        fi

        workspace_root="${GITHUB_WORKSPACE:-$(pwd)}"
        temp_root="${RUNNER_TEMP:-${workspace_root}/.runner-temp}"
        runtime_root="${temp_root}/ovmlayer-workspace"
        external_root="${temp_root}/external_layers"

        mkdir -p "${runtime_root}" "${external_root}"

        if [[ "${{ inputs.use-runtime-setup }}" == "true" ]]; then
          run_as_root env "PATH=$PATH" ovmlayer setup --runtime "${runtime_root}" --external "${external_root}" --rootfs-path="$(pwd)/base_rootfs"
        else
          run_as_root ovmlayer setup dev --base-rootfs="$(pwd)/base_rootfs.tar" --layer-disk=/tmp/layer-disk
        fi

        user_cfg="${HOME}/.ovmlayer_cfg.json"
        root_home="$(getent passwd 0 | cut -d: -f6)"
        root_cfg="${root_home}/.ovmlayer_cfg.json"
        user_has_cfg=0
        if [[ -e "${user_cfg}" ]]; then
          user_has_cfg=1
        fi

        root_has_cfg=0
        if run_as_root test -e "${root_cfg}"; then
          root_has_cfg=1
        fi

        if [[ "${user_cfg}" != "${root_cfg}" ]]; then
          if [[ "${user_has_cfg}" -eq 0 && "${root_has_cfg}" -eq 1 ]]; then
            ln -sf "${root_cfg}" "${user_cfg}"
            user_has_cfg=1
          fi

          if [[ "${root_has_cfg}" -eq 0 && "${user_has_cfg}" -eq 1 ]]; then
            run_as_root ln -sf "${user_cfg}" "${root_cfg}"
          fi
        fi
      shell: bash
