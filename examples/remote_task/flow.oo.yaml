name: remote-task-demo
nodes:
  # --- Task 1: single output ---
  - node_id: single-output
    task: hide-example::multiple-output
    inputs_from:
      - handle: input
        value: "test-single"

  - node_id: after-single-output
    task:
      executor:
        name: shell
      inputs_def:
        - handle: command
        - handle: envs
      outputs_def:
        - handle: stdout
    inputs_from:
      - handle: envs
        from_node:
          - node_id: single-output
            output_handle: output
      - handle: command
        value: "echo single-output-done"

  # --- Task 2: multiple outputs ---
  - node_id: multi-outputs
    task: hide-example::multiple-outputs
    inputs_from:
      - handle: input
        value: "test-multi"

  - node_id: after-multi-outputs
    task:
      executor:
        name: shell
      inputs_def:
        - handle: command
        - handle: envs
      outputs_def:
        - handle: stdout
    inputs_from:
      - handle: envs
        from_node:
          - node_id: multi-outputs
            output_handle: output
      - handle: command
        value: "echo multi-outputs-done"

  # --- Subflow: multiple-output-flow ---
  - node_id: flow-chain
    subflow: hide-example::multiple-output-flow
    inputs_from:
      - handle: input
        value: "test-flow"

  - node_id: after-flow-chain
    task:
      executor:
        name: shell
      inputs_def:
        - handle: command
        - handle: envs
      outputs_def:
        - handle: stdout
    inputs_from:
      - handle: envs
        from_node:
          - node_id: flow-chain
            output_handle: output
      - handle: command
        value: "echo flow-chain-done"
